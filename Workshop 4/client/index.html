<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .login-container {
      max-width: 520px;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container py-5 login-container">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3">Iniciar sesión</h3>

        <form id="loginForm" class="row g-3">
          <div class="col-12">
            <label class="form-label">Email</label>
            <input id="email" type="email" class="form-control" placeholder="correo@ejemplo.com" required />
          </div>

          <div class="col-12">
            <label class="form-label">Password</label>
            <input id="password" type="password" class="form-control" placeholder="Ingresa tu contraseña" required />
          </div>

          <div class="col-12 d-grid">
            <button class="btn btn-primary" type="submit">Entrar</button>
          </div>
        </form>

        <div class="mt-3 d-flex justify-content-between">
          <small>¿No tienes cuenta?</small>
          <a href="./register.html">Registrarme</a>
        </div>

        <div id="msg" class="mt-3"></div>
      </div>
    </div>
  </div>

  <script>
    const API = "http://localhost:3001";

    function showMsg(text, type="danger") {
      document.getElementById("msg").innerHTML =
        `<div class="alert alert-${type} py-2 mb-0">${text}</div>`;
    }

    // Si ya hay token, manda a la app
    if (sessionStorage.getItem("token")) {
      window.location.href = "./app.html";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        email: document.getElementById("email").value.trim().toLowerCase(),
        password: document.getElementById("password").value
      };

      try {
        const res = await fetch(API + "/auth/token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) return showMsg(data.message || "Login inválido");

        sessionStorage.setItem("token", data.token);
        window.location.href = "./app.html";
      } catch {
        showMsg("No se pudo conectar con la API");
      }
    });
  </script>
</body>
</html>

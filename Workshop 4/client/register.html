<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container-register {
            max-width: 520px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-5 container-register">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="mb-3">Registro de usuario</h3>

                <form id="registerForm" class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">Name</label>
                        <input id="name" class="form-control" placeholder="Enter your name" required />
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label">LastName</label>
                        <input id="lastName" class="form-control" placeholder="Enter your last name" required />
                    </div>

                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input id="email" type="email" class="form-control" placeholder="Enter your email" required />
                    </div>

                    <div class="col-12">
                        <label class="form-label">Password</label>
                        <input id="password" type="password" class="form-control" placeholder="Enter your password (min. 6 characters)" minlength="6" required />
                        <div class="form-text">Mínimo 6 caracteres.</div>
                    </div>

                    <div class="col-12 d-grid">
                        <button class="btn btn-primary" type="submit">Crear cuenta</button>
                    </div>
                </form>

                <div id="msg" class="mt-3"></div>
            </div>
        </div>
        <div class="mt-3">
            <a href="./index.html">Volver al login</a>
        </div>
    </div>

    <script>
        const API = "http://localhost:3001";

        function showMsg(text, type = "success") {
            document.getElementById("msg").innerHTML =
                `<div class="alert alert-${type} py-2 mb-0">${text}</div>`;
        }

        
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const payload = {
                name: document.getElementById("name").value.trim(),
                lastName: document.getElementById("lastName").value.trim(),
                email: document.getElementById("email").value.trim().toLowerCase(),
                password: document.getElementById("password").value
            };

            try {
                const res = await fetch(API + "/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    showMsg(data.message || "Error en el registro", "danger");
                    return;
                }

                showMsg("Usuario creado. Ahora puedes iniciar sesión.", "success");
                e.target.reset();
            } catch (err) {
                showMsg("No se pudo conectar con la API", "danger");
            }
        });
    </script>
</body>

</html>
